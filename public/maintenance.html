<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RetroAchievements - Maintenance</title>
    <script>
    // ============================================================
    // Edit these values on the server to update the page instantly.
    // ============================================================
    const CONFIG = {
        heading: "We'll be back shortly",
        subtitle: "The website is temporarily offline due to high demand.",
        emulatorsUp: true,
    };
    </script>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background-color: #121212;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
    }
    .container {
        max-width: 520px;
        width: 100%;
    }
    .logo {
        height: 40px;
        margin-bottom: 32px;
    }
    h1 {
        font-size: 20px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 8px;
    }
    .subtitle {
        color: #a3a3a3;
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 32px;
    }
    .status-card {
        border: 1px solid #262626;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 24px;
    }
    .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        font-size: 14px;
    }
    .status-row + .status-row {
        border-top: 1px solid #262626;
    }
    .status-label {
        color: #e5e5e5;
    }
    .status-badge {
        font-size: 12px;
        font-weight: 500;
        padding: 2px 10px;
        border-radius: 9999px;
    }
    .status-operational {
        background-color: rgba(34, 197, 94, 0.1);
        color: #4ade80;
    }
    .status-down {
        background-color: rgba(239, 68, 68, 0.1);
        color: #f87171;
    }
    .info {
        font-size: 13px;
        color: #a3a3a3;
        line-height: 1.6;
        margin-bottom: 12px;
    }
    .info + .info {
        margin-bottom: 0;
    }
    a {
        color: #cc9900;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
    .divider {
        border: none;
        border-top: 1px solid #262626;
        margin: 24px 0;
    }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="https://static.retroachievements.org/assets/images/ra-icon.webp" alt="RetroAchievements">

        <h1 id="heading"></h1>
        <p id="subtitle" class="subtitle"></p>

        <div id="status-card" class="status-card"></div>

        <p class="info">Your emulator will continue to work normally. Make sure it confirms you are logged in before playing to avoid missing unlocks.</p>
        <p class="info">Before closing your emulator, screenshot your unlocks list in case you need to request a manual unlock later.</p>

        <hr class="divider">

        <p class="info">For updates, join our <a href="https://discord.gg/retroachievements">Discord</a>.</p>
    </div>
    <script>
    document.getElementById('heading').textContent = CONFIG.heading;
    document.getElementById('subtitle').textContent = CONFIG.subtitle;

    const card = document.getElementById('status-card');
    const emuBadge = CONFIG.emulatorsUp ? 'status-operational' : 'status-down';
    const emuText = CONFIG.emulatorsUp ? 'Operational' : 'Down';
    card.innerHTML =
        `<div class="status-row"><span class="status-label">Website</span><span class="status-badge status-down">Down</span></div>` +
        `<div class="status-row"><span class="status-label">Emulator Connections</span><span class="status-badge ${emuBadge}">${emuText}</span></div>` +
        `<div class="status-row"><span class="status-label">Achievement Unlocks</span><span class="status-badge ${emuBadge}">${emuText}</span></div>`;
    </script>
</body>
</html>
