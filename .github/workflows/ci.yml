name: CI

on: [pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-22.04
    name: Check for changes
    outputs:
      php: ${{ steps.filter.outputs.php }}
      node: ${{ steps.filter.outputs.node }}
    steps:
      - name: Check changed files
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            php:
              - '**/*.php'
              - 'composer.json'
              - 'composer.lock'
              - 'phpstan.neon'
              - 'pint.json'
            node:
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.oxlintrc*'
              - '.oxfmtrc*'
              - 'resources/css/app.css'
              - 'resources/css/tailwind-v3-compat.css'
              - 'lang/**/*.json'

  node-setup:
    needs: changes
    runs-on: ubuntu-22.04
    name: Node.js Setup
    steps:
      - name: Checkout code
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Install pnpm
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.17

      - name: Use Node 24
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

  php-checks:
    needs: changes
    runs-on: ubuntu-22.04
    name: PHP Checks
    strategy:
      matrix:
        check: ['lint', 'analyse']
        include:
          - check: lint
            command: composer lint
          - check: analyse
            command: composer analyse -- --memory-limit=1G
            env:
              # PHPStan explodes if we're missing an APP_KEY. This is a value pulled from the Laravel docs.
              APP_KEY: 'base64:J63qRTDLub5NuZvP+kb8YIorGS6qFYHKVo6u7179stY='
    steps:
      - name: Skip if no PHP changes
        if: ${{ needs.changes.outputs.php != 'true' }}
        run: |
          echo "No PHP changes detected - skipping ${{ matrix.check }}"
          exit 0

      - name: Checkout code
        if: ${{ needs.changes.outputs.php == 'true' }}
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Setup PHP
        if: ${{ needs.changes.outputs.php == 'true' }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.4
          extensions: mbstring, :psr
          coverage: none
          ini-values: memory_limit=1G

      - name: Install composer packages
        if: ${{ needs.changes.outputs.php == 'true' }}
        run: composer install --prefer-dist

      - name: Restore PHPStan result cache
        if: ${{ needs.changes.outputs.php == 'true' && matrix.check == 'analyse' }}
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tmp
          key: phpstan-result-cache-${{ github.run_id }}
          restore-keys: |
            phpstan-result-cache-

      - name: Run ${{ matrix.check }}
        if: ${{ needs.changes.outputs.php == 'true' }}
        run: ${{ matrix.command }}
        env: ${{ matrix.env || fromJSON('{}') }}

      - name: Save PHPStan result cache
        if: ${{ needs.changes.outputs.php == 'true' && matrix.check == 'analyse' }}
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tmp
          key: phpstan-result-cache-${{ github.run_id }}

  php-tests:
    needs: changes
    runs-on: ubuntu-22.04
    name: PHP Checks (test)
    strategy:
      matrix:
        shardIndex: [1, 2, 3, 4, 5]
        shardTotal: [5]
    steps:
      - name: Skip if no PHP changes
        if: ${{ needs.changes.outputs.php != 'true' }}
        run: |
          echo "No PHP changes detected - skipping tests (shard ${{ matrix.shardIndex }})"
          exit 0

      - name: Checkout code
        if: ${{ needs.changes.outputs.php == 'true' }}
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Setup PHP
        if: ${{ needs.changes.outputs.php == 'true' }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.4
          extensions: mbstring, :psr
          coverage: none
          ini-values: memory_limit=1G

      - name: Install composer packages
        if: ${{ needs.changes.outputs.php == 'true' }}
        run: composer install --prefer-dist

      - name: Generate Passport keys
        if: ${{ needs.changes.outputs.php == 'true' }}
        run: php artisan passport:keys --force

      - name: Run tests with sharding
        if: ${{ needs.changes.outputs.php == 'true' }}
        run: ./vendor/bin/pest --shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

  merge-php-test-reports:
    needs: [changes, php-tests]
    runs-on: ubuntu-22.04
    name: Merge PHP Test Reports
    if: ${{ always() }}
    steps:
      - name: Check PHP test status
        run: |
          if [[ "${{ needs.changes.outputs.php }}" != "true" ]]; then
            echo "No PHP changes - skipping"
            exit 0
          fi
          if [[ "${{ needs.php-tests.result }}" != "success" ]]; then
            echo "php-tests failed"
            exit 1
          fi
          echo "All PHP tests passed"

  node-checks:
    needs: [changes, node-setup]
    runs-on: ubuntu-22.04
    name: Node.js Checks
    strategy:
      matrix:
        check: ['tsc', 'lint', 'format']
        include:
          - check: tsc
            command: pnpm tsc
          - check: lint
            command: pnpm lint
          - check: format
            command: pnpm format:check
    steps:
      - name: Skip if no Node changes
        if: ${{ needs.changes.outputs.node != 'true' }}
        run: |
          echo "No Node changes detected - skipping ${{ matrix.check }}"
          exit 0

      - name: Checkout code
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Install pnpm
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.17

      - name: Use Node 24
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        if: ${{ needs.changes.outputs.node == 'true' }}
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Setup PHP
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.4
          extensions: mbstring
          coverage: none

      - name: Install composer packages
        if: ${{ needs.changes.outputs.node == 'true' }}
        run: composer install --prefer-dist --no-progress

      - name: Generate Ziggy routes
        if: ${{ needs.changes.outputs.node == 'true' }}
        run: php artisan ziggy:generate --types

      - name: Run ${{ matrix.check }}
        if: ${{ needs.changes.outputs.node == 'true' }}
        run: ${{ matrix.command }}
        env: ${{ matrix.env || fromJSON('{}') }}

  node-tests:
    needs: [changes, node-setup]
    runs-on: ubuntu-22.04
    name: Node.js Checks (test)
    strategy:
      matrix:
        shardIndex: [1, 2, 3, 4, 5, 6, 7]
        shardTotal: [7]
    steps:
      - name: Skip if no Node changes
        if: ${{ needs.changes.outputs.node != 'true' }}
        run: |
          echo "No Node changes detected - skipping tests (shard ${{ matrix.shardIndex }})"
          exit 0

      - name: Checkout code
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Install pnpm
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.17

      - name: Use Node 24
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        if: ${{ needs.changes.outputs.node == 'true' }}
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Setup PHP
        if: ${{ needs.changes.outputs.node == 'true' }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.4
          extensions: mbstring
          coverage: none

      - name: Install composer packages
        if: ${{ needs.changes.outputs.node == 'true' }}
        run: composer install --prefer-dist --no-progress

      - name: Generate Ziggy routes
        if: ${{ needs.changes.outputs.node == 'true' }}
        run: php artisan ziggy:generate --types

      - name: Run tests with sharding
        if: ${{ needs.changes.outputs.node == 'true' }}
        run: pnpm test:run --coverage --coverage.thresholds=false --reporter=blob --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          VITE_BUILD_PATH: dist
          APP_URL: https://raweb.test
          LARAVEL_BYPASS_ENV_CHECK: 1

      - name: Upload blob report
        if: ${{ needs.changes.outputs.node == 'true' && !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: .vitest-reports/*
          include-hidden-files: true
          retention-days: 1

  merge-test-reports:
    needs: [changes, node-tests]
    runs-on: ubuntu-22.04
    name: Merge Node.js Test Reports
    # Only run if there are Node.js changes AND any of the test jobs were successful.
    if: ${{ needs.changes.outputs.node == 'true' && !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.17

      - name: Use Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Download blob reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: .vitest-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        run: pnpm test:run --merge-reports --coverage --coverage.reporters=text
        env:
          VITE_BUILD_PATH: dist
          APP_URL: https://raweb.test
          LARAVEL_BYPASS_ENV_CHECK: 1
